<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Quiet paper notebook mark: aged-ivory page, muted ink lines.
       Deliberately NOT a literal kaleidoscope (see PROJECT_BRIEF §2). -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#f6f1e7"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="11.25" fill="none" stroke="#d8d0c0" stroke-width="1.5"/>
  <!-- spine margin line, like a notebook's red margin but in muted clay -->
  <line x1="20" y1="12" x2="20" y2="52" stroke="#c8a68e" stroke-width="2" stroke-linecap="round"/>
  <!-- written lines, trailing off like handwriting -->
  <line x1="27" y1="22" x2="50" y2="22" stroke="#43403a" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="32" x2="46" y2="32" stroke="#43403a" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="42" x2="40" y2="42" stroke="#6b665c" stroke-width="3" stroke-linecap="round"/>
</svg>
